<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${pedido != null} ? 'Editar Pedido' : 'Novo Pedido'">Pedido</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" href="/global.css"/>
    <link rel="stylesheet" href="/form.css"/>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/pedidos">
            <i class="bi bi-clipboard2-check me-2"></i>Gestão de Pedidos
        </a>
    </div>
</nav>

<div class="container" style="max-width:640px">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/pedidos">Pedidos</a></li>
            <li class="breadcrumb-item active"
                th:text="${pedido != null} ? 'Editar' : 'Novo Pedido'">
            </li>
        </ol>
    </nav>

    <div class="card shadow-sm">
        <div class="card-header bg-white fw-bold">
            <i th:class="${pedido != null} ? 'bi bi-pencil-square me-2' : 'bi bi-plus-circle me-2'"></i>
            <span th:text="${pedido != null} ? 'Editar Pedido' : 'Novo Pedido'"></span>
        </div>
        <div class="card-body">

            <div th:if="${erro}" class="alert alert-danger">
                <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${erro}"></span>
            </div>

            <form th:action="${pedido != null} ? @{/pedidos/{id}(id=${pedido.id})} : @{/pedidos}"
                  method="post" novalidate>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label for="descricao" class="form-label fw-semibold">
                            Descrição <span class="text-danger">*</span>
                        </label>
                        <input type="text" id="descricao" name="descricao"
                               class="form-control" maxlength="255" required
                               placeholder="Descreva o pedido..."
                               th:value="${pedido?.descricao}"/>
                        <div class="form-text">Máximo 255 caracteres.</div>
                    </div>
                    <div class="col-md-6">
                        <label for="valor" class="form-label fw-semibold">
                            Valor (R$) <span class="text-danger">*</span>
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">R$</span>
                            <input type="text" id="valor" name="valor"
                                   class="form-control" required
                                   placeholder="0,00"
                                   th:value="${pedido?.valor}"/>
                        </div>
                        <div class="form-text">Use ponto ou vírgula como separador decimal. Mínimo: R$ 0,01.</div>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="observacao" class="form-label fw-semibold">
                        Observação <span class="text-muted fw-normal small">(opcional)</span>
                    </label>
                    <textarea id="observacao" name="observacao"
                              class="form-control" rows="3" maxlength="500"
                              placeholder="Informações adicionais, instruções especiais..."
                              th:text="${pedido?.observacao}"></textarea>
                    <div class="form-text">Máximo 500 caracteres.</div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">
                        <i th:class="${pedido != null} ? 'bi bi-floppy me-1' : 'bi bi-plus-lg me-1'"></i>
                        <span th:text="${pedido != null} ? 'Salvar Alterações' : 'Criar Pedido'"></span>
                    </button>
                    <a th:href="${pedido != null} ? @{/pedidos/{id}(id=${pedido.id})} : '/pedidos'"
                       class="btn btn-outline-secondary">
                        <i class="bi bi-x-lg me-1"></i>Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>

</div>

<footer class="app-footer">
    <i class="bi bi-clipboard2-check"></i>
    <span>Gestão de Pedidos</span>
    <span class="app-footer-dot">&bull;</span>
    <span>Infnet &copy; 2026</span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
